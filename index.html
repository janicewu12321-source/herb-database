<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药食同源中药数据库 · 宠物食品应用</title>
<style>
:root {
  --bg: #f5f2eb;
  --card-bg: #ffffff;
  --text: #2c2416;
  --text-secondary: #6b5e4f;
  --border: #e0d5c1;
  --accent: #5b8c5a;
  --accent-light: #e8f2e4;
  --warm: #c4783b;
  --warm-light: #fdf0e4;
  --cold: #4a7c8b;
  --cold-light: #edf4f7;
  --caution: #d4943a;
  --avoid: #c0392b;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}
/* Header */
.header {
  background: linear-gradient(135deg, #3a5a3a 0%, #5b8c5a 50%, #6d9b5a 100%);
  color: #fff;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.header h1 { font-size: 2em; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
.header p { opacity: 0.9; font-size: 0.95em; }
/* Stats bar */
.stats-bar {
  display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  padding: 20px 24px; max-width: 1400px; margin: 0 auto;
}
.stat-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 14px 22px;
  box-shadow: var(--shadow); text-align: center; min-width: 100px; flex: 1;
  border-left: 4px solid var(--accent);
}
.stat-card.warn { border-left-color: var(--caution); }
.stat-card.danger { border-left-color: var(--avoid); }
.stat-card .num { font-size: 1.6em; font-weight: 700; color: var(--accent); }
.stat-card.warn .num { color: var(--caution); }
.stat-card.danger .num { color: var(--avoid); }
.stat-card .label { font-size: 0.8em; color: var(--text-secondary); margin-top: 2px; }
/* Main layout */
.container { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; }
/* Search & filter */
.search-bar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 240px; padding: 12px 18px;
  border: 2px solid var(--border); border-radius: var(--radius);
  font-size: 1em; background: var(--card-bg); transition: 0.2s;
}
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.filter-group {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.filter-chip {
  padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card-bg); cursor: pointer; font-size: 0.85em;
  transition: all 0.2s; white-space: nowrap; user-select: none;
}
.filter-chip:hover { border-color: var(--accent); background: var(--accent-light); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-chip.pet-dog.active { background: #5b8c5a; border-color: #5b8c5a; }
.filter-chip.pet-cat.active { background: #4a7c8b; border-color: #4a7c8b; }
.filter-chip.safe-chip.active { background: #3a7d44; border-color: #3a7d44; }
.filter-chip.caution-chip.active { background: #d4943a; border-color: #d4943a; }
.filter-chip.avoid-chip.active { background: #c0392b; border-color: #c0392b; }
.filter-label {
  font-size: 0.8em; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 1px; margin-right: 2px;
  display: flex; align-items: center; padding: 7px 0;
}
.filter-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
/* Results */
.result-info {
  font-size: 0.85em; color: var(--text-secondary); margin-bottom: 14px;
}
.herb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.herb-card {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; cursor: pointer;
  transition: all 0.25s; position: relative;
}
.herb-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.12); }
.herb-card .card-img {
  height: 180px; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; background: #e8e0d5;
}
.herb-card .card-img img {
  width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s;
}
.herb-card:hover .card-img img { transform: scale(1.05); }
.herb-card .card-img .img-fallback {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 3.5em; color: #fff; font-weight: 700;
}
.herb-card .card-badge {
  position: absolute; top: 8px; right: 8px; padding: 3px 10px;
  border-radius: 12px; font-size: 0.7em; font-weight: 700; color: #fff;
}
.badge-used { background: #3a7d44; }
.badge-caution { background: #d4943a; }
.badge-avoid { background: #c0392b; }
.herb-card .card-body { padding: 14px 16px; }
.herb-card .card-name { font-size: 1.15em; font-weight: 700; margin-bottom: 2px; }
.herb-card .card-latin { font-size: 0.75em; font-style: italic; color: var(--text-secondary); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.herb-card .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  padding: 2px 10px; border-radius: 10px; font-size: 0.7em;
  font-weight: 600; white-space: nowrap;
}
.tag-efficacy { background: var(--accent-light); color: var(--accent); }
.tag-family { background: var(--cold-light); color: var(--cold); }
.tag-part { background: var(--warm-light); color: var(--warm); }
/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 1000; justify-content: center; align-items: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card-bg); border-radius: 16px;
  max-width: 620px; width: 100%; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;
}
.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; font-size: 1.6em;
  cursor: pointer; color: var(--text-secondary); z-index: 10;
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; transition: 0.2s;
}
.modal-close:hover { background: var(--bg); }
.modal-img {
  height: 250px; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; background: #e8e0d5;
}
.modal-img img { width: 100%; height: 100%; object-fit: cover; }
.modal-img .img-fallback {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 6em; color: #fff; font-weight: 700;
}
.modal-body { padding: 24px 28px 28px; }
.modal-body h2 { font-size: 1.6em; margin-bottom: 4px; }
.modal-body .latin-name { font-style: italic; color: var(--text-secondary); font-size: 0.95em; margin-bottom: 16px; }
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px;
}
.detail-item {
  background: #f9f7f2; padding: 10px 14px; border-radius: 8px;
}
.detail-item .d-label { font-size: 0.7em; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
.detail-item .d-value { font-size: 0.95em; font-weight: 600; margin-top: 2px; }
.pet-section {
  margin-top: 16px; padding: 16px; border-radius: var(--radius);
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.pet-col { padding: 12px; border-radius: 8px; }
.pet-col.dog { background: #f0f7f2; border: 1px solid #c8e0c8; }
.pet-col.cat { background: #f2f5f8; border: 1px solid #c8d8e0; }
.pet-col h4 { margin-bottom: 6px; font-size: 0.95em; display: flex; align-items: center; gap: 6px; }
.pet-icon { font-size: 1.4em; }
.pet-status { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.75em; font-weight: 700; margin-bottom: 6px; }
.pet-status.recommended { background: #3a7d44; color: #fff; }
.pet-status.available { background: #5b8c5a; color: #fff; }
.pet-status.caution { background: #d4943a; color: #fff; }
.pet-status.avoid { background: #c0392b; color: #fff; }
.pet-note { font-size: 0.8em; color: var(--text-secondary); line-height: 1.5; }
/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.empty-state .icon { font-size: 3em; margin-bottom: 12px; }
/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 1.4em; }
  .herb-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .detail-grid { grid-template-columns: 1fr; }
  .pet-section { grid-template-columns: 1fr; }
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 70px; padding: 10px 14px; }
  .stat-card .num { font-size: 1.2em; }
}
</style>
</head>

  {id:130,name:"益母草",latin:"Leonurus japonicus Houtt.",family:"唇形科",part:"干燥地上部分",efficacy:["活血"],imgGrad:["#7a4a7a","#4a2a4a"],pet:{dog:"available",cat:"caution",dogNote:"活血调经，母犬产后可用",catNote:"活血作用，猫需谨慎使用"}},
  {id:131,name:"夏枯草",latin:"Prunella vulgaris L.",family:"唇形科",part:"干燥果穗",efficacy:["清热"],imgGrad:["#5a4a7a","#3a2a4a"],pet:{dog:"available",cat:"available",dogNote:"清肝明目，宠物眼部配方可用",catNote:"适量安全"}},
  {id:132,name:"香附",latin:"Cyperus rotundus L.",family:"莎草科",part:"干燥根茎",efficacy:["理气"],imgGrad:["#8b7a5a","#5a4a3a"],pet:{dog:"available",cat:"available",dogNote:"疏肝理气，宠物消化配方可用",catNote:"适量安全"}},
  {id:133,name:"辛夷",latin:"Magnolia biondii Pamp.",family:"木兰科",part:"干燥花蕾",efficacy:["解表"],imgGrad:["#c4a0b0","#8b7a7a"],pet:{dog:"available",cat:"caution",dogNote:"散风寒，宠物呼吸道配方可用",catNote:"含挥发油，猫慎用"}},
  {id:134,name:"积雪草",latin:"Centella asiatica (L.) Urb.",family:"伞形科",part:"干燥全草",efficacy:["清热"],imgGrad:["#4a7a4a","#2a4a2a"],pet:{dog:"available",cat:"available",dogNote:"清热利湿，宠物皮肤修复配方可用",catNote:"适量安全，皮肤修复"}},
];

// ==================== APP STATE ====================
const state = { pet: 'all', safety: 'all', efficacy: 'all', family: 'all', search: '', category: 'all' };

// ==================== HELPERS ====================
const EFFICACY_COLORS = {
  "补气":"#5b8c5a","补血":"#c44a3a","补阴":"#4a7c8b","补阳":"#d4943a","理气":"#6b9a4a",
  "消食":"#c4803a","利水渗湿":"#4a8b9a","清热":"#4a9a5a","解表":"#8b7a8b","化痰止咳":"#8b9a6b",
  "安神":"#7a5a9b","收涩":"#6b5a4a","活血":"#c42a4a","止血":"#9b4a4a","温里":"#d45a2a",
  "润下":"#8b7a4a","祛风湿":"#7a6b4a","驱虫":"#5a5a3a","祛风":"#6b8b5a"
};

function getCardGradient(h) {
  return `linear-gradient(135deg, ${h.imgGrad[0]}, ${h.imgGrad[1]})`;
}

// 图片路径：优先本地 images/ 文件夹，由 download_images.py 脚本下载
function getImagePath(h) {
  if (h.id >= 107) {
    return `images/76_${String(h.id-106).padStart(3,'0')}_${h.name}.jpg`;
  }
  return `images/${String(h.id).padStart(3,'0')}_${h.name}.jpg`;
}

// 外部植物照片参考链接
function getExternalLinks(h) {
  const latinEnc = encodeURIComponent(h.latin.split(' ').slice(0,2).join(' '));
  const nameEnc = encodeURIComponent(h.name);
  return {
    iplant: `https://www.iplant.cn/info/${latinEnc}?t=n`,
    ppbc: `https://ppbc.iplant.cn/search19?q=${nameEnc}`,
    wikimedia: `https://commons.wikimedia.org/w/index.php?search=${nameEnc}+${latinEnc}&title=Special:MediaSearch&type=image`,
    inaturalist: `https://www.inaturalist.org/search?q=${latinEnc}&source=species`,
  };
}

function renderCardImage(h) {
  const imgPath = getImagePath(h);
  const gradient = getCardGradient(h);
  return `
    <img src="${imgPath}" alt="${h.name}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      onload="this.style.display='block';">
    <div class="img-fallback" style="display:none;background:${gradient};">${h.name[0]}</div>`;
}

function renderModalImage(h) {
  const imgPath = getImagePath(h);
  const gradient = getCardGradient(h);
  return `
    <img src="${imgPath}" alt="${h.name}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      onload="this.style.display='block';">
    <div class="img-fallback" style="display:none;background:${gradient};font-size:5em;">${h.name}</div>`;
}

function getPetStatus(h, petType) {
  if (petType === 'dog') return h.pet.dog;
  return h.pet.cat;
}

function getPetNote(h, petType) {
  if (petType === 'dog') return h.pet.dogNote;
  return h.pet.catNote;
}

const STATUS_LABELS = {
  recommended: '✅ 已用于宠物食品',
  available: '👍 可使用',
  caution: '⚠️ 慎用',
  avoid: '🚫 避免使用'
};

const STATUS_ORDER = { recommended: 0, available: 1, caution: 2, avoid: 3 };

// ==================== FILTERING ====================
function matchesFilter(h) {
  // Search text
  if (state.search) {
    const q = state.search.toLowerCase();
    const haystack = [h.name, h.latin, h.family, h.part, ...h.efficacy].join(' ').toLowerCase();
    if (!haystack.includes(q)) return false;
  }
  // Efficacy
  if (state.efficacy !== 'all' && !h.efficacy.includes(state.efficacy)) return false;
  // Family
  if (state.family !== 'all') {
    if (state.family === '其他科属') {
      const majorFamilies = ['豆科','蔷薇科','唇形科','姜科','菊科','芸香科','百合科','禾本科','伞形科','睡莲科','多孔菌科'];
      if (majorFamilies.includes(h.family)) return false;
    } else if (h.family !== state.family) return false;
  }
  // Pet type + Safety
  if (state.pet !== 'all') {
    const status = getPetStatus(h, state.pet);
    if (state.safety !== 'all' && status !== state.safety) return false;
  } else if (state.safety !== 'all') {
    // If no pet selected but safety filter is active, match if either dog or cat has that status
    if (h.pet.dog !== state.safety && h.pet.cat !== state.safety) return false;
  }
  return true;
}

function getFilteredHerbs() {
  let allHerbs = HERBS;
  if (state.category === '76only') {
    allHerbs = HERBS_76;
  } else if (state.category === 'all') {
    allHerbs = HERBS.concat(HERBS_76);
  }
  return allHerbs.filter(matchesFilter);
}

// ==================== RENDER ====================
function updateStats() {
  const filtered = getFilteredHerbs();
  const total = HERBS.length;
  const allHerbs = HERBS.concat(HERBS_76);
  const dogRec = allHerbs.filter(h => h.pet.dog === 'recommended').length;
  const catRec = allHerbs.filter(h => h.pet.cat === 'recommended').length;
  const dogAvoid = allHerbs.filter(h => h.pet.dog === 'avoid').length;
  const catAvoid = allHerbs.filter(h => h.pet.cat === 'avoid').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="num">${HERBS.length}</div><div class="label">药食同源</div></div>
    <div class="stat-card"><div class="num">${HERBS_76.length}</div><div class="label">非药食同源</div></div>
    <div class="stat-card"><div class="num">${filtered.length}</div><div class="label">当前筛选结果</div></div>
    <div class="stat-card"><div class="num">${dogRec}</div><div class="label">🐕 犬已用</div></div>
    <div class="stat-card"><div class="num">${catRec}</div><div class="label">🐈 猫已用</div></div>
    <div class="stat-card warn"><div class="num">${dogAvoid + catAvoid}</div><div class="label">⚠️ 避免</div></div>
  `;
}

function renderCards() {
  const herbs = getFilteredHerbs();
  const grid = document.getElementById('herbGrid');
  const info = document.getElementById('resultInfo');
  const is76 = state.category === '76only';
  const label = is76 ? '非药食同源植物（饲料目录7.6类收录）' : '药食同源植物';
  info.textContent = `共找到 ${herbs.length} 种${label}`;

  if (herbs.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>没有找到匹配的结果，请调整筛选条件</p></div>`;
    updateStats();
    return;
  }

  const activePet = state.pet;
  grid.innerHTML = herbs.map(h => {
    const efficacyTags = h.efficacy.map(e => `<span class="tag tag-efficacy">${e}</span>`).join('');
    let badgeHtml = '';
    if (h.id >= 107) {
      badgeHtml = '<span class="card-badge" style="background:#7a5a9b;">非药食同源</span>';
    }
    if (activePet !== 'all') {
      const status = getPetStatus(h, activePet);
      if (status === 'recommended') badgeHtml += '<span class="card-badge badge-used">已应用</span>';
      else if (status === 'caution') badgeHtml += '<span class="card-badge badge-caution">慎用</span>';
      else if (status === 'avoid') badgeHtml += '<span class="card-badge badge-avoid">避免</span>';
    }
    return `
      <div class="herb-card" onclick="openDetail(${h.id})">
        <div class="card-img">${renderCardImage(h)}</div>
        ${badgeHtml}
        <div class="card-body">
          <div class="card-name">${h.name}</div>
          <div class="card-latin">${h.latin}</div>
          <div class="card-tags">
            ${efficacyTags}
            <span class="tag tag-family">${h.family}</span>
            <span class="tag tag-part">${h.part}</span>
          </div>
        </div>
      </div>`;
  }).join('');
  updateStats();
}

function openDetail(id) {
  const h = HERBS.find(x => x.id === id);
  if (!h) return;
  const efficacyTags = h.efficacy.map(e => `<span class="tag tag-efficacy">${e}</span>`).join(' ');
  const links = getExternalLinks(h);
  const is76 = h.id >= 107;

  const dogStatus = h.pet.dog;
  const catStatus = h.pet.cat;

  document.getElementById('modalBox').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img">${renderModalImage(h)}</div>
    <div class="modal-body">
      <h2>${h.name}${is76 ? ' <span style="font-size:0.6em;background:#7a5a9b;color:#fff;padding:2px 8px;border-radius:8px;vertical-align:middle;">非药食同源</span>' : ''}</h2>
      <p class="latin-name">${h.latin}</p>
      <div class="detail-grid">
        <div class="detail-item"><div class="d-label">科名</div><div class="d-value">${h.family}</div></div>
        <div class="detail-item"><div class="d-label">使用部位</div><div class="d-value">${h.part}</div></div>
        <div class="detail-item"><div class="d-label">功效分类</div><div class="d-value">${efficacyTags}</div></div>
        <div class="detail-item"><div class="d-label">收录目录</div><div class="d-value">${is76 ? '饲料原料目录 7.6 类' : '药食同源 第'+h.batch+'批 ('+[2002,2002,2019,2023,2024][h.batch]+'年)'}</div></div>
      </div>
      <div class="pet-section">
        <div class="pet-col dog">
          <h4><span class="pet-icon">🐕</span> 犬</h4>
          <span class="pet-status ${dogStatus}">${STATUS_LABELS[dogStatus]}</span>
          <p class="pet-note">${h.pet.dogNote}</p>
        </div>
        <div class="pet-col cat">
          <h4><span class="pet-icon">🐈</span> 猫</h4>
          <span class="pet-status ${catStatus}">${STATUS_LABELS[catStatus]}</span>
          <p class="pet-note">${h.pet.catNote}</p>
        </div>
      </div>
      <div style="margin-top:18px;padding:14px;background:#f9f7f2;border-radius:10px;">
        <h4 style="margin:0 0 8px;font-size:0.9em;">📷 查看植物照片</h4>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <a href="${links.iplant}" target="_blank" rel="noopener" style="padding:6px 14px;background:#5b8c5a;color:#fff;border-radius:16px;text-decoration:none;font-size:0.8em;">🌿 iPlant 植物智</a>
          <a href="${links.ppbc}" target="_blank" rel="noopener" style="padding:6px 14px;background:#4a7c8b;color:#fff;border-radius:16px;text-decoration:none;font-size:0.8em;">📸 PPBC 图像库</a>
          <a href="${links.wikimedia}" target="_blank" rel="noopener" style="padding:6px 14px;background:#6b5e4f;color:#fff;border-radius:16px;text-decoration:none;font-size:0.8em;">🖼️ Wikimedia</a>
          <a href="${links.inaturalist}" target="_blank" rel="noopener" style="padding:6px 14px;background:#3a7d44;color:#fff;border-radius:16px;text-decoration:none;font-size:0.8em;">🦎 iNaturalist</a>
        </div>
        <p style="font-size:0.72em;color:var(--text-secondary);margin-top:8px;">本地图片由 download_images.py 脚本下载。若未显示图片，请运行脚本或点击上方链接查看外部数据库照片。</p>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ==================== EVENT HANDLERS ====================
document.getElementById('searchInput').addEventListener('input', function(e) {
  state.search = e.target.value.trim();
  renderCards();
});

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', function() {
    const filterType = this.dataset.filter;
    const filterVal = this.dataset.val;
    state[filterType] = filterVal;
    // Update active states for this filter group
    document.querySelectorAll(`.filter-chip[data-filter="${filterType}"]`).forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    renderCards();
  });
});

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ==================== INIT ====================
renderCards();
</script>
</body>
</html>
